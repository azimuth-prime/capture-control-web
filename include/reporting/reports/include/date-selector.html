<html>
	<head>
		<link href="https://fonts.googleapis.com/css?family=Bungee|Open+Sans+Condensed:300" rel="stylesheet">
    	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        
	</head>
	<body style="font-family: 'Open Sans Condensed', sans-serif;">
		<div>
			<div class="row m-2">
				<div class="col-sm-12">
					<div class="card card-body">
						<div class="row">
							<div class="col-sm-6">
				   				<div class="form-group mt-2">
				   					<div class="input-group">
				   						<label class="pe-2" for="poNumber"><strong>From Date</strong></label>
				   						<div class="input-group-append">
		            						<span class="text-danger"></span>
		            					</div>
				   					</div>
				   					<p><small>Select the From Date.</small></p>
				   					<input class="form-control form-control-sm" type="date" name="fromDate" id="fromDate" />
				   				</div>
				   			</div>
				   			<div class="col-sm-6">
				   				<div class="form-group mt-2">
				   					<div class="input-group">
				   						<label class="pe-2" for="poNumber"><strong>To Date</strong></label>
				   						<div class="input-group-append">
		            						<span class="text-danger"></span>
		            					</div>
				   					</div>
				   					<p><small>Select the To Date.</small></p>
				   					<input class="form-control form-control-sm" type="date" name="toDate" id="toDate" />
				   				</div>
				   			</div>
						</div>
						<div class="row mt-2">
							<div class="col-sm-12">
								<button type="button" class="btn float-end m-2 btn-sm btn-outline-primary">Print</button>
								<button type="button" class="btn float-end m-2 btn-sm btn-outline-secondary">Apply Dates</button>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row m-2">
				<div class="col-sm-12">
					<div class="card card-body">
						<table class="table table-sm small">
							<thead>
								<tr>
									<th>Inventory Id</th>
									<th>Product</th>
									<th class="text-center">SKU Id</th>
									<th class="text-center">Quantity</th>
									<th class="text-center">Adjustment Date</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>24343-324234-2342342-4234</td>
									<td>
										765346289-001 <br />
										<span class="small">Tube Assembly</span>
									</td>
									<td class="text-center">SKU10000034</td>
									<td class="text-center">-50</td>
									<td class="text-center">Apr 23, 2024</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
