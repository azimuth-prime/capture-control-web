<!DOCTYPE html>
<html>
	<head>
		<title>Inventory Codes</title>
		
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    	<meta name="description" content="">
    	
    	<link href="https://fonts.googleapis.com/css?family=Bungee|Open+Sans+Condensed:300" rel="stylesheet">
    	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="/assets/css/global.css" />
        <link rel="stylesheet" href="/assets/css/print.css" />
        
        <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
        <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-cookies.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
		<script src="/app/global/data.js"></script>
		
		<script src="/app/capture-control.module.js"></script>
		<script src="/app/global/filters.js"></script>
		<script src="/app/global/functions.js"></script>
		<script src="/app/auth/auth.service.js"></script>
		<script src="/app/product/sku.service.js"></script>
		<script src="/app/order/order.service.js"></script>
		<script src="/app/warehouse/warehouse.service.js"></script>
		
		<script src="/app/crm/user.controller.js"></script>
		<script src="/app/warehouse/warehouse.controller.js"></script>
		<script src="/app/global/barcode.min.js"></script>
 
		<style>@page { size: letter }</style>		
	</head>
	<body ng-app="captureControlApp" ng-cloak style="font-family: 'Open Sans Condensed', sans-serif;">
  		<div class="row mb-5 ml-5 mr-5 mt-5 hidden-sm">
			<div class="col-sm-12">
				<button class="btn btn-outline-danger float-end me-2" onclick="window.close()" type="button">Close</button>
				<button class="btn btn-outline-success float-end me-2" onclick="window.print()" type="button">Print</button>
			</div>
		</div>
		<section class="sheet padding-10mm" ng-controller="warehouseController" ng-init="findAllInventoryItems()">
			<div class="row">
				<div class="col-sm-12">
					<div class="card card-body">
						<div class="row">
							<div class="col-sm-4 p-2">
								<img src="/assets/images/logos/text-logo-3-dark.png" class="img-fluid"/>
							</div>
							<div class="col-sm-8">
								<div class="vr"></div>
								<h1 class="float-end me-3"><strong>Inventory Items</strong></h1>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row">
				<div class="col-sm-12">
					<div class="card card-body p-0 ps-2">
						<div class="row fw-bold text-uppercase">
							<div class="col-sm-12 text-center">
								<svg id="orderBarcode"></svg>								
							</div>
						</div>
					</div>
				</div>
			</div>
			
			<div class="row">
				<div class="col-sm-12">
					<div class="card card-body p-0 ps-2">
						<div class="row me-2">
							<div class="col-sm-12">
								<table class="table table-sm table-borderless">
								<thead>
									<tr class="fw-bold text-uppercase">
										<th class="text-center">Barcode</th>
										<th class="text-center">Inventory ID</th>
										<th class="text-center">Sku Id</th>
									</tr>
								</thead>
								<tbody>
									<tr ng-repeat="item in inventory" class="align-middle fw-bold text-uppercase">
										<td class="text-center">
											<svg id="itemBarcode{{$index}}"></svg>	
											{{ generateBarcode('#itemBarcode' + $index, item.id, true, 1, 40, 15); }}
										</td>
										<td class="text-center">{{item.id}}</td>
										<td class="text-center">{{item.skuId}}</td>
									</tr>
								</tbody>
							</table>
							</div>							
						</div>
					</div>
				</div>
			</div>
        </section> 
		
		
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  	</body>
	
</html>
