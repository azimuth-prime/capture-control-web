<!DOCTYPE html>
<html>
	<head>
		<title>Print Order</title>
		
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    	<meta name="description" content="">
    	
    	<link href="https://fonts.googleapis.com/css?family=Bungee|Open+Sans+Condensed:300" rel="stylesheet">
    	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="/assets/css/global.css" />
        <link rel="stylesheet" href="/assets/css/print.css" />
        
        <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
        <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-cookies.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>
		<script src="//ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/angular-ui/bower-ui-grid/ui-grid.min.js"></script>
        
        <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
		<script src="/app/capture-control.module.js"></script>
		<script src="/app/global/filters.js"></script>
		<script src="/app/global/functions.js"></script>
		<script src="/app/auth/auth.service.js"></script>
		<script src="/app/print/print.service.js"></script>
		<script src="/app/print/print.controller.js"></script>
		<script src="/app/global/barcode.min.js"></script>
 
 		<script type="text/javascript">
 			function resizeIframe(iframe) {
				iframe.height = iframe.contentWindow.document.body.scrollHeight + "px";
			}
		</script>  
		
		<style>
		
		@page { size: landscape; margin: 10mm 0 10mm 0; }	
		
		@media print {
			table{page-break-after: auto;}
		}
		
		#contentFrame {
           margin: 0;
		   padding: 0;
		   width: 100%;
           position: absolute;
        }	
        </style>
	</head>
	<body ng-app="captureControlApp" ng-cloak style="font-family: 'Open Sans Condensed', sans-serif;" ng-controller="printController" ng-init="init()">
  		<div class="row mb-2 ms-5 me-5 mt-2 hidden-sm">
			<div class="col-sm-12">
				<button class="btn btn-outline-danger float-end me-2" onclick="window.close()" type="button">Close</button>
				<button class="btn btn-outline-success float-end me-2" onclick="window.print()" type="button">Print</button>
			</div>
		</div>
		<!-- Content iframe -->
    	<iframe id="contentFrame" onload="resizeIframe(this)" scrolling="no"></iframe>
    	
    	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
	</body>
</html>
